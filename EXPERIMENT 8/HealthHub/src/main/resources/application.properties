spring.application.name=HealthHub

# H2 DATABASE CONFIGURATION
spring.datasource.url=jdbc:h2:mem:crudapi
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 CONSOLE
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / HIBERNATE
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Optional: make Hibernate generate SQL suited for H2
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# Specifies the SQL dialect used by Hibernate for MySQL
# Helps Hibernate generate correct SQL queries for MySQL
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

stripe.secret.key =Api_Secret-Key


# ----------- Props to send mail
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your_email@gmail.com
spring.mail.password=pass

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true